# Render Blueprint — deploy with: Render dashboard → New → Blueprint → pick this repo.
# Free web service; database + file storage are external (Supabase).
# Set every `sync: false` value in the dashboard when prompted.
services:
  - type: web
    name: nero
    runtime: python
    plan: free
    region: frankfurt          # change to the region nearest your users
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && gunicorn Nero_platform.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true     # Render generates a strong random value
      - key: ENCRYPTION_KEY
        sync: false             # set manually: Fernet.generate_key()
      - key: ALLOWED_HOSTS
        sync: false             # e.g. nero.onrender.com,yourdomain.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false             # e.g. https://nero.onrender.com
      - key: DATABASE_URL
        sync: false             # paste your Supabase POOLER connection string (URI)
      # Object storage for uploads (Cloudflare R2 / S3) — set when ready:
      - key: USE_S3_MEDIA
        value: "0"              # flip to "1" once the bucket + keys below are set
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false              # Supabase: https://<ref>.supabase.co/storage/v1/s3
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        sync: false              # Supabase project region, e.g. eu-central-1
      - key: S3_ADDRESSING_STYLE
        value: "path"            # Supabase requires path-style (R2/S3 use virtual)
      - key: SENTRY_DSN
        sync: false             # optional error tracking
      # Google login (optional): set both to enable "Continue with Google"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Email (optional): leave blank to log emails instead of sending. To send,
      # set EMAIL_HOST + creds from a provider (Brevo/Resend/Gmail).
      - key: EMAIL_HOST
        sync: false             # e.g. smtp-relay.brevo.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false             # e.g. Nero <you@yourdomain.com>

# No Render database — Postgres is hosted on Supabase (set DATABASE_URL above).
